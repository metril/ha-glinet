name: Release

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update manifest version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          jq --arg v "$VERSION" '.version = $v' custom_components/glinet/manifest.json > tmp.json
          mv tmp.json custom_components/glinet/manifest.json

      - name: Create release ZIP
        run: |
          cd custom_components/glinet
          zip -r ../../glinet.zip .

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./glinet.zip
          asset_name: glinet.zip
          asset_content_type: application/zip
